{% extends 'base.html' %}

{% block content %}

<h2>Books</h2>

<a href="{% url 'add_book' %}"><button>Add Book</button></a>

<table border="1">
<tr>
    <th>Name</th>
    <th>Author</th>
    <th>Stock</th>
    <th>Actions</th>
</tr>

{% for book in books %}
<tr>
    <td>{{ book.book_name }}</td>
    <td>{{ book.author }}</td>
    <td>{{ book.stock }}</td>
    <td>
        <a href="{% url 'edit_book' book.id %}">Edit</a>
        <a href="{% url 'delete_book' book.id %}">Delete</a>
        <a href="{% url 'book_detail' book.id %}">View</a>
    </td>
</tr>
{% endfor %}

</table>

{% endblock %}
