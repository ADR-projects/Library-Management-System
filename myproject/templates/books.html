{% extends 'base.html' %}

{% block content %}

<h2><i class="fa-solid fa-sm fa-book" style="color: rgba(0, 2, 43, 0.774);"></i> Books</h2>

<a href="{% url 'add_book' %}"><button><i class="fa-solid fa-sm fa-book" style="color: rgb(255, 255, 255);"></i>  Add Book</button></a>

<table border="1">
<tr>
    <th>Book_ID</th>
    <th>Name</th>
    <th>Author</th>
    <th>Genre</th>
    <th>Stock</th>
    <th>Availability</th>
    <th>Actions</th>
</tr>

{% for book in books %}
<tr>
    <td>{{book.id}}</td>
    <td>{{ book.title }}</td>
    <td>{{ book.author }}</td>
    <td>{{book.genre}}</td>
    <td>{{ book.stock }}</td>
    <td>{{book.available_books }}</td>
    <td>
        <a href="{% url 'edit_book' book.id %}"><i class="edit-btn fa-solid fa-pen-to-square" style="color: rgb(9, 179, 40);"></i></a>
        <a href="{% url 'delete_book' book.id %}"><i class="delete-btn fa-solid fa-trash" style="color: rgb(239, 79, 41);"></i></a>
        <a href="{% url 'book_detail' book.id %}"><i class="view-btn fa-solid fa-eye" style="color: rgb(0, 129, 230);"></i></a>
    </td>
</tr>
{% endfor %}

</table>

{% endblock %}
