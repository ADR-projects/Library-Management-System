{% extends 'base.html' %}

{% block content %}

<h2><i class="fa-solid fa-sm fa-pen-to-square" style="color: rgba(0, 2, 43, 0.774);"></i> Edit This User</h2>

<form method="POST">
    {% csrf_token %}

    {% if form.errors %}
        <div style="color:red;">
            {{ form.errors }}
        </div>
    {% endif %}

    <label>Name</label>
    {{ form.name }}

    <label>Email</label>
    {{ form.email }}

    <label>Phone</label>
    {{ form.phone }}

    <label>Address</label>
    {{ form.address }}

    <br><br>

    <button type="submit">Update</button>
    <button type="button" onclick="history.back()">Go Back</button>
</form>

{% endblock %}
