{% extends 'base.html' %}

{% block content %}

<h2>Users</h2>

<a href="{% url 'add_user' %}"><button>Add User</button></a>

<table border="1">
<tr>
    <th>Name</th>
    <th>Email</th>
    <th>Actions</th>
</tr>

{% for user in users %}
<tr>
    <td>{{ user.name }}</td>
    <td>{{ user.email }}</td>
    <td>
        <a href="{% url 'edit_user' user.id %}">Edit</a>
        <a href="{% url 'delete_user' user.id %}">Delete</a>
        <a href="{% url 'user_detail' user.id %}">View</a>
    </td>
</tr>
{% endfor %}

</table>

{% endblock %}
