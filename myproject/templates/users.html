{% extends 'base.html' %}

{% block content %}

<h2><i class="fa-solid fa-sm fa-user" style="color: rgba(0, 2, 43, 0.774);"></i> Users</h2>

<a href="{% url 'add_user' %}"><button><i class="fa-solid fa-user-plus" style="color: rgb(255, 255, 255);"></i>  Add User</button></a>

<table border="1">
<tr>
    <th>User_ID</th>
    <th>Name</th>
    <th>Email</th>
    <th>Phone</th>
    <th>Actions</th>
</tr>

{% for user in users %}
<tr>
    <td>{{user.id}}</td>
    <td>{{ user.name }}</td>
    <td>{{ user.email }}</td>
    <td>{{user.phone}}</td>
    <td>
        <a href="{% url 'edit_user' user.id %}"><i class="edit-btn fa-solid fa-pen-to-square" style="color: rgb(9, 179, 40);"></i></a>
        <a href="{% url 'delete_user' user.id %}"><i class="delete-btn fa-solid fa-trash" style="color: rgb(239, 79, 41);"></i></a>
        <a href="{% url 'user_detail' user.id %}"><i class="view-btn fa-solid fa-eye" style="color: rgb(0, 129, 230);"></i></a>
    </td>
</tr>
{% endfor %}

</table>

{% endblock %}
