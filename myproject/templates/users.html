{% extends 'base.html' %}

{% block content %}

<h2><i class="fa-solid fa-sm fa-user" style="color: rgba(0, 2, 43, 0.774);"></i> Users</h2>

<div class="search-bar-container">
    <div class="search-wrapper">
      <i class="fa-solid fa-magnifying-glass"></i>
      <input type="text" id="userSearch" class="search-input" placeholder="Search by name, email, or phone...">
    </div>
    <a href="{% url 'add_user' %}"><button class = "beside-search-bar-btn"><i class="fa-solid fa-user-plus" style="color: rgb(255, 255, 255);"></i>  Add User</button></a>
  </div>

<table border="1" id="usersTable"><tbody>
<tr>
    <th>User_ID</th>
    <th>Name</th>
    <th>Email</th>
    <th>Phone</th>
    <th>Actions</th>
</tr>

{% for user in users %}
<tr>
    <td>{{user.id}}</td>
    <td>{{ user.name }}</td>
    <td>{{ user.email }}</td>
    <td>{{user.phone}}</td>
    <td>
        <a href="{% url 'edit_user' user.id %}"><i class="edit-btn fa-solid fa-pen-to-square" style="color: rgb(9, 179, 40);"></i></a>
        {% if user.id in locked_user_ids %}
        <span class="locked-action" title="Cannot delete user while they have an active borrowed book."><i class="delete-btn fa-solid fa-trash" style="color: rgb(180, 180, 180); cursor: not-allowed;"></i></span>
        {% else %}
        <a href="{% url 'delete_user' user.id %}" onclick="return confirm('Are you sure you want to delete this user?');"><i class="delete-btn fa-solid fa-trash" style="color: rgb(239, 79, 41);"></i></a>
        {% endif %}
        <a href="{% url 'user_detail' user.id %}"><i class="view-btn fa-solid fa-eye" style="color: rgb(0, 129, 230);"></i></a>
    </td>
</tr>
{% endfor %}
</tbody></table>

<script>
  document.getElementById('userSearch').addEventListener('keyup', function(e) {
    const query = e.target.value.toLowerCase();
    document.querySelectorAll('#usersTable tbody tr').forEach(row => {
      row.style.display = row.textContent.toLowerCase().includes(query) ? '' : 'none';
    });
  });
</script>

{% endblock %}
